# code: language=ansible

tailscale_oauth_client_id: "{{ vault_tailscale_authkey_rotation_app_client_id }}"
tailscale_oauth_client_secret: "{{ vault_tailscale_authkey_rotation_app_client_secret }}"
tailscale_node_tags:
  - tag:auto-generated

security_autoupdate_mail_on_error: true
security_autoupdate_mail_to: "unattended@{{ domainname_personal }}"
security_autoupdate_reboot: true
security_autoupdate_reboot_time: 03:00
security_sudoers_passwordless:
  - "{{ vault_server_username }}"

llm_default_model: "gemma4:31b-cloud"
llm_default_host: "{{ hostvars['apple-macmini-m4-16gb-malcolm']['host_ipv4'] }}"
llm_default_openai_uri: "http://{{ llm_default_host }}:11434/v1"

# Locale
config_system_locale: 'en_GB.UTF-8'
config_system_language: 'en_GB.UTF-8'

# Repo
repo_url: https://github.com/awfulwoman/infra
repo_name: infra

# Docker
default_docker_network: guineanet

# DNS — authoritative A records for the infra zone (served by infra-named).
# Moved here from the infra-named role default: this is deployment topology, not
# generic role behaviour. Apex + www point at storage, which fronts services via
# its reverse proxy. Referencing host_ipv4 keeps it correct if storage moves.
bind_records_a:
  - name: "@" # zone apex ({{ domainname_infra }})
    ip: "{{ hostvars['server-64gb-storage']['host_ipv4'] }}"
  - name: "www"
    ip: "{{ hostvars['server-64gb-storage']['host_ipv4'] }}"

# Radicale (CalDAV/CardDAV) — shared between composition-radicale (which provisions
# this as its htpasswd user) and composition-gateway (which authenticates as it)
radicale_username: charlie

# Ansible
ansible_path: "/opt/ansible"
ansible_log_path: "{{ ansible_path }}/logs"
ansible_vault_password_file: "{{ ansible_path }}/.vaultpassword"
ansible_roles_path: "{{ ansible_path }}/galaxy/roles"
ansible_collections_path: "{{ ansible_path }}/galaxy/collections"
ansible_infra_dir: "/fastpool/repos/infra"

# Python
default_bin_path: /usr/local/bin
systemd_service_path: /etc/systemd/system

# Terraform
terraform_working_dir: /opt/terraform

# Deployed apps base directory
awfulwoman_opt_dir: /opt/awfulwoman

# Hetzner
hetzner_floating_ip: 78.47.163.140

nullmailer_mail_recipient: "hardcoded@{{ domainname_personal }}"
nullmailer_relay_host: "smtp.{{ vault_mailprovider_domain }}"
nullmailer_relay_port: 465
nullmailer_relay_user: "{{ vault_mailprovider_user }}"
nullmailer_relay_pass: "{{ vault_mailprovider_password }}"
nullmailer_allmailfrom: "{{ vault_mailprovider_user }}"

# Environment Variables
environment_config:
  ANSIBLE_FORCE_COLOR: true
  ANSIBLE_PATH: "{{ ansible_path }}"
  ANSIBLE_LOG_PATH: "{{ ansible_log_path }}"
  ANSIBLE_VAULT_PASSWORD_FILE: "{{ ansible_vault_password_file }}"
  ANSIBLE_ROLES_PATH: "{{ ansible_roles_path }}:./roles"
  ANSIBLE_COLLECTIONS_PATH: "{{ ansible_collections_path }}"
  ANSIBLE_INFRA_DIR: "{{ ansible_infra_dir }}"
  TF_VAR_digitalocean_token: "{{ vault_ddns_digitalocean_token }}"
  TF_VAR_hcloud_token: "{{ vault_hetzner_api_key_rw }}"
