    # -------------------------------------------------------------------
    sitedeployment:
      hosts:
        host-sites:

    # -------------------------------------------------------------------
    # VAGRANT HOSTS
    # Vagrant hosts, commonly used for development
    # -------------------------------------------------------------------
    vagrant:
      hosts:
        vagrant-wrapper:

