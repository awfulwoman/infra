all:

  # -------------------------------------------------------------------
  # UNASSIGNED HOSTS
  # Only hosts not assigned to any group should need to be lsited here
  # -------------------------------------------------------------------
  # hosts:

  children:

    # -------------------------------------------------------------------
    # MANAGED INFRA
    # Everything that is managed by Ansible is listed here
    # -------------------------------------------------------------------
    infra:
      hosts:
        host-albion:
        host-backups:
        host-belinda:
        host-deedee:
        host-homebrain:
        host-malcolm:
        host-pikvm:
        host-samson:
        host-sites:
        host-storage:
        host-test-router:

    # -------------------------------------------------------------------
    # HOME AUTOMATION
    # Hosts running home automation services
    # -------------------------------------------------------------------
    homeautomation:
      hosts:
        host-homebrain:

    # -------------------------------------------------------------------
    # ZFS
    # Hosts that use ZFS
    # -------------------------------------------------------------------
    zfs:
      hosts:
        host-storage:
        host-homebrain:
        host-deedee:
        host-backups:
        # host-albion: # Has died
        host-samson:
        host-sites:
        host-belinda:

    # -------------------------------------------------------------------
    # ZFS REPLICATION SOURCES
    # Hosts acting as replication sources
    # -------------------------------------------------------------------
    zfs-backup-clients:
      hosts:
        host-storage:
        host-homebrain:
        host-deedee:
        host-sites:
        host-samson:

    # -------------------------------------------------------------------
    # ZFS REPLICATION DESTINATIONS
    # Hosts acting as replication destination
    # -------------------------------------------------------------------
    zfs-backup-servers:
      hosts:
        host-backups:
        host-belinda:

    # -------------------------------------------------------------------
    # ZFS REPLICATION DESTINATIONS - OFFSITE
    # Hosts acting as offsite replication destination
    # NOTE: the only offsite host died - needs replacing
    # -------------------------------------------------------------------
    # zfs-backup-offsite:
    #   hosts:
    #     host-albion:

    # -------------------------------------------------------------------
    # PUBLIC SERVERS
    # Hosts that static sites can be deployed to
    # -------------------------------------------------------------------
    sitedeployment:
      hosts:
        host-sites:

    # -------------------------------------------------------------------
    # VAGRANT HOSTS
    # Vagrant hosts, commonly used for development
    # -------------------------------------------------------------------
    vagrant:
      hosts:
        vagrant-wrapper:

    # -------------------------------------------------------------------
    # UNMANAGED DEVICES
    # Known stable devices that require DNS and static IP addresses
    # -------------------------------------------------------------------
    unmanaged:
      hosts:
        unmanaged-ap-bedroom:
        unmanaged-ap-livingroom:
        unmanaged-ap-pantry:
        unmanaged-av-appletv:
        unmanaged-av-chromecast:
        unmanaged-av-hifi:
