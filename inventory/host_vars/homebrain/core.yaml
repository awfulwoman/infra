# -------------------------------------------------------------------
# ANSIBLE
# -------------------------------------------------------------------
ansible_host: homebrain
ansible_user: "{{ vault_server_username }}"
ansible_become_password: "{{ vault_password }}"

# -------------------------------------------------------------------
# IDENTITY
# -------------------------------------------------------------------
host_type: baremetal
host_name: homebrain
host_city: ber
host_location: xberg
host_pfqdn: "{{ host_name }}.{{ host_location }}.{{ host_city }}"
host_fqdn: "{{ host_pfqdn }}.{{ domain_name }}"
host_description: "Home automation hub"

# -------------------------------------------------------------------
# NETWORK
# -------------------------------------------------------------------
host_ipv4: 192.168.1.130
host_primary_interface: "enp1s0"
host_ipv4_subnet: 24

# -------------------------------------------------------------------
# UBUNTUPRO
# -------------------------------------------------------------------
ubuntupro_attach: true

# -------------------------------------------------------------------
# ZFS
# -------------------------------------------------------------------

zfs:
  fastpool:
    vdevs:
      - type: stripe
        disks: /dev/disk/by-id/scsi-SATA_INTENSO_SSD_AA000000000000001079
    datasets:
      misc:
        datasets:
          syncthing:
            policy: critical
      compositions:
        state: present
        policy: critical

# -------------------------------------------------------------------
# MISC
# -------------------------------------------------------------------

composition_motioneye_usbdevice: /dev/video0

docker_port_open: true

traefik_providers:
  - homeassistant
  - esphome
  - watchyourlan

cnames:
  - homeassistant.{{ domain_name }}
  - ha.{{ domain_name }}
  - esphome.{{ domain_name }}
  - mctest.{{ domain_name }}
  - lan.{{ domain_name }}
