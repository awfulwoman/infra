# -------------------------------------------------------------------
# IDENTITY
# -------------------------------------------------------------------
host_type: baremetal
host_name: backups
host_region: ber
host_site: xberg
host_pfqdn: "{{ host_name }}.{{ host_site }}.{{ host_region }}"
host_fqdn: "{{ host_pfqdn }}.{{ domain_name }}"
host_description: "Dedicated backup server (being sunsetted)"

# -------------------------------------------------------------------
# NETWORK
# Hint: Use `network_netplan_config:` for more fine-grained control
# Docs: roles/network-netplan/README.md
# -------------------------------------------------------------------
host_ipv4: 192.168.1.118
host_ipv4_subnet: 24
host_primary_interface: "enp3s0"

# -------------------------------------------------------------------
# ANSIBLE
# -------------------------------------------------------------------
ansible_host: "{{ host_ipv4 }}"
ansible_user: "{{ vault_server_username }}"
ansible_become_password: "{{ vault_password }}"

# -------------------------------------------------------------------
# ZFS
# -------------------------------------------------------------------
zfs:
  slowpool:
    vdevs:
      - type: mirror
        disks:
          - /dev/disk/by-id/scsi-SATA_ST2000DM008-2FR1_ZK308FPE
          - /dev/disk/by-id/scsi-SATA_ST2000DM008-2FR1_ZK308GLF
      - type: mirror
        disks:
          - /dev/disk/by-id/scsi-SATA_ST2000DM008-2FR1_ZK308JA0
          - /dev/disk/by-id/scsi-SATA_WDC_WD20EZAZ-00L_WD-WX82AB005EXH
    datasets:
      compositions:
      encryptedbackups:
        state: present

# Backups
backups_zfs_server_local_dataset: slowpool/encryptedbackups
backups_zfs_server_offsite_enabled: false

# -------------------------------------------------------------------
# COMPOSITIONS
# -------------------------------------------------------------------

compositions_dataset: slowpool/compositions
