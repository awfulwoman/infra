# -------------------------------------------------------------------
# IDENTITY
# -------------------------------------------------------------------
host_type: baremetal
host_name: pikvm
host_region: ber
host_site: xberg
host_pfqdn: "{{ host_name }}.{{ host_site }}.{{ host_region }}"
host_fqdn: "{{ host_pfqdn }}.{{ domain_name }}"
host_description: "KVM over IP device"

# -------------------------------------------------------------------
# NETWORK
# -------------------------------------------------------------------
host_ipv4: 192.168.1.111
host_primary_interface: "enp3s0"
host_ipv4_subnet: 24

# -------------------------------------------------------------------
# ANSIBLE
# -------------------------------------------------------------------
ansible_host: "{{ host_ipv4 }}" # How to access the host
ansible_user: root # User to connect as
ansible_become_password: "{{ vault_password }}"
ansible_remote_tmp: "/tmp/.ansible/tmp"
