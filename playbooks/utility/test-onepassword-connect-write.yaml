- name: Test 1Password Connect write/read tokens
  hosts: apple-macmini-m4-16gb-malcolm
  connection: local
  gather_facts: false
  tasks:
    - name: Generate and store password via CLI script
      ansible.builtin.command:
        cmd: python3 scripts/op-infra-write.py ansible-write-token-test --username testuser
        chdir: "{{ playbook_dir }}/../../"
      environment:
        OP_CONNECT_TOKEN_WRITE: "{{ lookup('ansible.builtin.env', 'OP_CONNECT_TOKEN_WRITE') }}"
      register: script_result
      no_log: true

    - name: Parse script output
      ansible.builtin.set_fact:
        generated_password: "{{ script_result.stdout | trim }}"
        created_item_id: "{{ script_result.stderr | regex_search('id: ([a-z0-9]+)', '\\1') | first }}"
      no_log: true

    - name: Show created item ID
      ansible.builtin.debug:
        msg: "Created item ID: {{ created_item_id }}"

    - name: Read item back using read token
      ansible.builtin.set_fact:
        read_back_password: >-
          {{ lookup('community.general.onepassword', created_item_id,
               vault='Infra',
               connect_host='https://connect.' + domainname_infra,
               connect_token=vault_onepassword_connect_infra_token_read) }}
      no_log: true

    - name: Confirm write and read passwords match
      ansible.builtin.assert:
        that:
          - read_back_password == generated_password
        success_msg: "Round-trip confirmed — stored and retrieved passwords match"
        fail_msg: "Mismatch between stored and retrieved password"
