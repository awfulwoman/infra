---
- name: NAS and general workloads
  hosts: server-64gb-storage
  roles:
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: start
    tags: [monitoring, monitoring-healthchecksio]
  - role: bootstrap-ubuntu-server
    tags: [bootstrap, bootstrap-ubuntu-server]
  - role: network-netplan
    tags: [network, network-netplan]
  - role: hardware-host-bus-adapter
    tags: [hardware, hardware-host-bus-adapter]
  - role: system-wakeonlan
    tags: [system, system-wakeonlan]
  - role: client-nut
    tags: [client, client-nut]
  - role: system-zfs
    tags: [system, zfs, system-zfs]
  - role: system-zfs-policy
    tags: [system, zfs, system-zfs-policy]
  - role: system-mqtt2cmd
    tags: [system, system-mqtt2cmd]
  - role: infothrill.nullmailer
    become: true
  - role: server-nfs
    tags: [server, server-nfs]
  - role: virtual-qemu-host
    tags: [virtual, virtual-qemu-host]
  - role: backups-zfs-client
    tags: [backups, zfs, backups-zfs-client]
  - role: composition-zfs-api
    tags: [composition, zfs, composition-zfs-api]
  - role: composition-victoriametrics
    tags: [composition, composition-victoriametrics]
  - role: composition-loki
    tags: [composition, loki, composition-loki]
  - role: composition-reverseproxy
    tags: [composition, composition-reverseproxy]
  - role: composition-container-management
    tags: [composition, composition-container-management]
  - role: composition-github2karakeep
    tags: [composition, composition-github2karakeep]
  - role: composition-finances
    tags: [composition, composition-finances]
  - role: composition-gitea
    tags: [composition, composition-gitea]
  - role: composition-gitea-runners
    tags: [composition, composition-gitea-runners]
  - role: composition-jellyfin
    tags: [composition, composition-jellyfin]
  - role: composition-immich
    tags: [composition, composition-immich]
  - role: composition-llm-inference-calculator
    tags: [composition, composition-llm-inference-calculator]
  - role: composition-audiobookshelf
    tags: [composition, composition-audiobookshelf]
  - role: composition-downloads
    tags: [composition, composition-downloads]
  - role: composition-syncthing
    tags: [composition, composition-syncthing]
  - role: composition-karakeep
    tags: [composition, composition-karakeep, ollama]
  - role: composition-freshrss
    tags: [composition, composition-freshrss]
  - role: composition-tubesync
    tags: [composition, composition-tubesync]
  - role: composition-homepage
    tags: [composition, composition-homepage]
  - role: composition-piper
    tags: [composition, composition-piper]
  - role: composition-gotosocial
    tags: [composition, composition-gotosocial]
  - role: composition-libretranslate
    tags: [composition, composition-libretranslate]
  - role: composition-n8n
    tags: [composition, composition-n8n]
  - role: composition-memorybank
    tags: [composition, composition-memorybank]
  - role: composition-paperless-ngx
    tags: [composition, composition-paperless-ngx]
  - role: composition-vikunja
    tags: [composition, composition-vikunja]
  - role: composition-radicale
    tags: [composition, composition-radicale]
  - role: composition-uptime-kuma
    tags: [composition, composition-uptime-kuma]
  - role: composition-mcp-kagisearch
    tags: [composition, composition-mcp-kagisearch]
  - role: composition-mcp-openzim
    tags: [composition, composition-mcp-openzim]
  - role: composition-searxng
    tags: [composition, composition-searxng]
  - role: composition-mcp-searxng
    tags: [composition, composition-mcp-searxng]
  - role: composition-kiwix
    tags: [composition, composition-kiwix]
  - role: composition-chives
    vars:
      composition_name: chives
      composition_chives_telegram_token: "{{ vault_chives_telegram_token }}"
      composition_chives_telegram_chat_id: "{{ vault_chives_telegram_chat_id }}"
      composition_chives_mcps:
        - url: "http://mcp-searxng:3000/mcp" # on same host
          auth_key: "{{ vault_mcp_searxng_auth_token }}"
    tags: [composition, composition-chives, ollama]
  - role: composition-chives
    vars:
      composition_name: holly
      composition_chives_mcps:
        - url: "https://gateway.{{ domainname_infra }}/mcp" # on Malcolm
        - url: "http://mcp-searxng:3000/mcp" # on same host
          auth_key: "{{ vault_mcp_searxng_auth_token }}"
    tags: [composition, composition-chives, ollama]
  - role: composition-open-webui
    tags: [composition, composition-open-webui, ollama]
  - role: system-emailbackup
    tags: [system, system-emailbackup]
  - role: system-smartmontools
    tags: [system, system-smartmontools]
  - role: system-promtail
    tags: [system, system-promtail]
    # - role: system-sleepuntil
    #   become: true
    # - role: system-powertop
  - role: composition-nominatim
    tags: [composition, composition-nominatim]
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: success
    tags: [monitoring, monitoring-healthchecksio]

  handlers:
  - name: Reboot host
    become: true
    ansible.builtin.reboot:
