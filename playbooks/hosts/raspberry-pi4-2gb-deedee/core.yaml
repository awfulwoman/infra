- name: DeeDee - aw man, we're off to Yonkers
  hosts: raspberry-pi4-2gb-deedee
  roles:
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: start
    tags: [monitoring, monitoring-healthchecksio]
  - role: hardware-raspberry-pi
    tags: [hardware, hardware-raspberry-pi]
  - role: bootstrap-ubuntu-server
    tags: [bootstrap, bootstrap-ubuntu-server]
  - role: network-netplan
    tags: [network, network-netplan]
  - role: infothrill.nullmailer
    become: true
  - role: system-sshkey
    tags: [system, system-sshkey]
  - role: system-repos
    tags: [system, system-repos]
  - role: system-zfs
    tags: [system, zfs, system-zfs]
  - role: infra-public-resources
    tags: [infra, infra-public-resources]
  - role: infra-private-resources
    tags: [infra, infra-private-resources]
  - role: infra-named
    tags: [infra, infra-named]
  - role: infra-certbot
    tags: [infra, infra-certbot]
  - role: system-claude
    tags: [system, system-claude]
  - role: composition-reverseproxy
    tags: [composition, composition-reverseproxy]
  - role: composition-container-management
    tags: [composition, composition-container-management]
  - role: composition-zfs-api
    tags: [composition, zfs, composition-zfs-api]
  - role: backups-zfs-client
    tags: [backups, zfs, backups-zfs-client]
  - role: script-share-personal-site
    tags: [script, script-share-personal-site]
  - role: system-promtail
    tags: [system, promtail, system-promtail]
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: success
    tags: [monitoring, monitoring-healthchecksio]

  handlers:
  - name: Reboot host
    become: true
    ansible.builtin.reboot:
