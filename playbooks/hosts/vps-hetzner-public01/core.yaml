- name: Out on the internet server
  hosts: vps-hetzner-public01
  roles:
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: start
    tags: [monitoring, monitoring-healthchecksio]
  - role: bootstrap-ubuntu-server
    tags: [bootstrap, bootstrap-ubuntu-server]
  - role: virtual-hetzner
    tags: [virtual, virtual-hetzner]
  - role: user-site-deployment
    tags: [user, user-site-deployment]
  - role: system-zfs
    tags: [system, zfs, system-zfs]
  - role: system-zfs-policy
    tags: [system, zfs, system-zfs-policy]
  - role: client-nfs
    tags: [client, client-nfs]
  - role: composition-reverseproxy
    tags: [composition, composition-reverseproxy]
  - role: composition-container-management
    tags: [composition, composition-container-management]
  - role: composition-awfulwoman
    tags: [composition, composition-awfulwoman]
  - role: composition-zfs-api
    tags: [composition, zfs, composition-zfs-api]
  - role: system-promtail
    tags: [system, promtail, system-promtail]
  - role: monitoring-healthchecksio
    monitoring_healthchecksio_ping_type: success
    tags: [monitoring, monitoring-healthchecksio]

  handlers:
  - name: Reboot host
    become: true
    ansible.builtin.reboot:
