- name: Out on the internet server
  hosts: host-sites
  gather_facts: false
  pre_tasks:
    - name: Check connectivity
      ansible.builtin.wait_for_connection:
        timeout: 5
      register: connectivity
      ignore_unreachable: true
      ignore_errors: true
    - name: Skip play if host is unreachable
      ansible.builtin.meta: end_host
      when: connectivity.failed | default(false)
    - name: Gather host facts, continuing as normal
      ansible.builtin.setup:
  roles:
    - role: bootstrap-ubuntu-server
      tags: [bootstrap]
    - role: virtual-hetzner
      tags: [virtual]
    - role: user-site-deployment
    - role: system-zfs
      tags: [system, zfs]
    - role: system-zfs-policy
      tags: [system, zfs]
    - role: client-nfs
      tags: [client]
    - role: composition-reverseproxy
      tags: [compositions]
    - role: composition-container-management
      tags: [compositions]
    - role: composition-awfulwoman
      tags: [compositions]
    - role: composition-zfs-api
      tags: [compositions, zfs]
    - role: monitoring-healthchecksio
      tags: [monitoring]
    - role: system-promtail
      tags: [system, promtail]

  handlers:
    - name: Reboot host
      become: true
      ansible.builtin.reboot:
