- name: DeeDee Server - ZFS API
  hosts: host-raspberry-pi4-2gb-deedee
  vars:
    compositions:
      - zfs-api
  roles:
    - role: composition-reverseproxy
    - role: composition-container-management
    - role: composition-zfs-api
      tags: [compositions, zfs]

  handlers:
    - name: Reboot host
      become: true
      ansible.builtin.reboot:
