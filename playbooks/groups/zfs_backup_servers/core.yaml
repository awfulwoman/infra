- name: Configure a host to pull ZFS backups from clients
  hosts: zfs_backup_servers
  roles:
    - role: system-zfs
      tags: [system, zfs]
    - role: system-zfs-policy
      tags: [system, zfs]
    - role: backups-zfs-server
      tags: [backups, zfs]
    - role: composition-container-management
      tags: [composition, composition-container-managements]
    - role: composition-reverseproxy
      tags: [compositions, composition-reverseproxy]
    - role: composition-zfs-api
      tags: [compositions, zfs, composition-zfs-api]

  handlers:
    - name: Reboot host
      become: true
      ansible.builtin.reboot:
