# code: language=ansible

- name: "Deploy run script"
  become: true
  ansible.builtin.template:
    src: automation-infra.sh.j2
    dest: "{{ automation_infra_script_path }}"
    owner: root
    group: "{{ automation_infra_root_group }}"
    mode: "0755"

- name: "Verify playbook path exists"
  ansible.builtin.stat:
    path: "{{ automation_infra_playbooks_base_path }}/{{ item }}"
  register: playbook_check
  failed_when: not playbook_check.stat.exists
  loop: "{{ automation_infra_playbooks }}"

- name: "Verify inventory path exists"
  ansible.builtin.stat:
    path: "{{ automation_infra_inventory }}"
  register: inventory_check
  failed_when: not inventory_check.stat.exists

# Linux (systemd)

- name: "Create systemd service"
  become: true
  ansible.builtin.template:
    src: automation-infra.service.j2
    dest: /etc/systemd/system/{{ automation_infra_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: ansible_facts['os_family'] != 'Darwin'

- name: "Create systemd timer"
  become: true
  ansible.builtin.template:
    src: automation-infra.timer.j2
    dest: /etc/systemd/system/{{ automation_infra_service_name }}.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: ansible_facts['os_family'] != 'Darwin'

- name: "Enable and start systemd timer"
  become: true
  ansible.builtin.systemd:
    name: "{{ automation_infra_service_name }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  when: ansible_facts['os_family'] != 'Darwin'

# macOS (launchd)

- name: "Ensure log directory exists"
  become: true
  ansible.builtin.file:
    path: /usr/local/var/log
    state: directory
    owner: root
    group: wheel
    mode: "0755"
  when: ansible_facts['os_family'] == 'Darwin'

- name: "Deploy launchd plist"
  become: true
  ansible.builtin.template:
    src: automation-infra.plist.j2
    dest: /Library/LaunchDaemons/{{ automation_infra_plist_label }}.plist
    owner: root
    group: wheel
    mode: "0644"
  notify: Reload launchd
  when: ansible_facts['os_family'] == 'Darwin'

- name: "Check if launchd service is bootstrapped"
  become: true
  ansible.builtin.command:
    cmd: launchctl print system/{{ automation_infra_plist_label }}
  register: launchd_check
  failed_when: false
  changed_when: false
  when: ansible_facts['os_family'] == 'Darwin'

- name: "Bootstrap launchd service"
  become: true
  ansible.builtin.command:
    cmd: launchctl bootstrap system /Library/LaunchDaemons/{{ automation_infra_plist_label }}.plist
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - launchd_check.rc != 0
