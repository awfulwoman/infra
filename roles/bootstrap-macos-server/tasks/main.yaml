# Boostraps a MacOS server

# Disable power saving

- name: Auto-attach tmux on SSH login
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts.user_dir }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: tmux-ssh-autoattach"
    block: |
      if [[ -n "$SSH_CONNECTION" ]] && [[ -z "$TMUX" ]]; then
        [[ "$TERM" == *-ghostty ]] && export TERM=xterm-256color
        tmux new-session -A -s main
      fi
    create: true
    mode: "0644"

- name: Ensure default consumer apps are absent
  become: true
  ansible.builtin.file:
    path: /Applications/{{ item }}
    state: absent
  loop:
    - GarageBand.app
    - iMovie.app
    - Keynote.app
    - Numbers.app
    - Pages.app
