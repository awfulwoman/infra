- name: Register subdomain to a Tailscale address via Hetzner's DNS
  hetzner.hcloud.zone_rrset:
    api_token: "{{ vault_hetzner_api_key_rw }}"
    zone: "{{ domainname_infra }}"
    name: "{{ domain_item }}"
    type: "A"
    records:
      - value: "{{ ansible_facts['tailscale0']['ipv4']['address'] }}"
        comment: "Tailscale"
    state: present
  loop: "{{ configure_dns_subdomains }}"
  loop_control:
    loop_var: domain_item
  when: ansible_facts['tailscale0']['ipv4']['address'] is defined

- name: Confirm DNS
  ansible.builtin.debug:
    msg: "Tailscale domain: {{ domain_item }}.{{ domainname_infra }}"
  loop: "{{ configure_dns_subdomains }}"
  loop_control:
    loop_var: domain_item
  when: ansible_facts['tailscale0']['ipv4']['address'] is defined

