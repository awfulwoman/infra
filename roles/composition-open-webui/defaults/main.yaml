# Composition name (used by composition-common dependency)
composition_name: open-webui

# Ollama API URL. Defaults to the shared llm_default_host (Malcolm).
# Override per-host if Ollama is running elsewhere.
composition_open_webui_ollama_base_url: "http://{{ llm_default_host }}:11434"

composition_open_webui_subdomains:
  - chat
