# Bootstraps an Ubuntu machine

- name: Ensure core apt packages are installed
  become: true
  ansible.builtin.apt:
    name: "{{ bootstrap_ubuntu_apt_packages + bootstrap_ubuntu_apt_packages_extra }}"
    state: present
    update_cache: true
    cache_valid_time: 3600  # Don't update if cache is less than 1 hour old

- name: Automation key updater (GitHub SSH keys)
  ansible.builtin.include_role:
    name: automation-key-updater

- name: Ensure user has bash as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /bin/bash

- name: Ensure timezone is correct
  become: true
  community.general.timezone:
    name: "{{ bootstrap_ubuntu_timezone }}"

- name: Ensure locale files are available
  become: true
  community.general.locale_gen:
    name: "{{ config_system_locale }}"
    state: present

- name: Ensure language files are available
  become: true
  community.general.locale_gen:
    name: "{{ config_system_language }}"
    state: present

- name: Get current locale and language configuration
  become: true
  ansible.builtin.command: localectl status
  register: locale_status
  changed_when: false

- name: Parse 'LANG' from current locale and language configuration
  become: true
  ansible.builtin.set_fact:
    locale_lang: "{{ locale_status.stdout | regex_search('LANG=([^\n]+)', '\\1') | first }}"

- name: Parse 'LANGUAGE' from current locale and language configuration
  become: true
  ansible.builtin.set_fact:
    locale_language: "{{ locale_status.stdout | regex_search('LANGUAGE=([^\n]+)', '\\1') | default([locale_lang], true) | first }}"

- name: Configure locale and language
  become: true
  ansible.builtin.command: localectl set-locale LANG={{ config_system_locale }} LANGUAGE={{ config_system_language }}
  changed_when: locale_lang != config_system_locale or locale_language != config_system_language

- name: Ensure hostname is correct
  become: true
  ansible.builtin.hostname:
    name: "{{ host_name }}"

- name: Ensure 127.0.1.1 is correct
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ host_name }}"

# On 2026/05/02 Canonicals's launchpad suffered a major outage due to a DDoS, causing all PPAs to become unavailable.
# This caused apt operations to fail and break the playbook runs. Removing the PPAs until Canonical gets their act together.
- name: Ensure PPAs are removed - ffs Canonical
  become: true
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ ppa_item }}"
    state: absent
  loop_control:
    loop_var: ppa_item
  loop:
    - ppa_ansible_ansible_noble.list
    - ppa_tomtomtom_yt_dlp_noble.list
    - ppa_m_grant_prg_utils_noble.list
  notify: Update apt

- name: Ensure direnv hook is enabled
  become: true
  ansible.builtin.lineinfile:
    dest: "/home/{{ item }}/.bashrc"
    line: 'eval "$(direnv hook bash)"'
    state: present
    insertafter: EOF
    create: true
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0644"
  loop:
    - root
    - "{{ ansible_user }}"

# - name: Pipx
#   ansible.builtin.include_role:
#     name: system-pipx

- name: Env vars
  no_log: true
  ansible.builtin.include_role:
    name: system-environment

- name: Ubuntu Pro
  ansible.builtin.include_role:
    name: system-ubuntupro

- name: Security
  ansible.builtin.include_role:
    name: system-security
  vars:
    security_fail2ban_enabled: false

- name: MOTD
  ansible.builtin.include_role:
    name: system-motd
  vars:
    ansible_become: true

- name: Check if Tailscale is already connected
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status_raw
  changed_when: false
  failed_when: false

- name: Parse Tailscale connection state
  ansible.builtin.set_fact:
    tailscale_connected: >-
      {{
        (tailscale_status_raw.rc == 0) and
        ((tailscale_status_raw.stdout | from_json).BackendState == 'Running')
      }}

- name: Generate Tailscale auth key
  ansible.builtin.include_role:
    name: network-tailscale-authkey
  when: not tailscale_connected

- name: Tailscale
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_up_skip: "{{ tailscale_connected }}"
  when: tailscale_exit_node is undefined or tailscale_exit_node is not true

- name: Tailscale - with exit node
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_args: "--advertise-exit-node"
    tailscale_up_skip: "{{ tailscale_connected }}"
  when: tailscale_exit_node is defined and tailscale_exit_node is true

- name: Git
  ansible.builtin.include_role:
    name: system-git

