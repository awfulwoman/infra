# Bootstraps an Ubuntu machine

- name: Ensure core apt packages are installed
  become: true
  ansible.builtin.apt:
    name: "{{ bootstrap_ubuntu_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600  # Don't update if cache is less than 1 hour old

- name: Automation key updater (GitHub SSH keys)
  ansible.builtin.include_role:
    name: automation-key-updater

- name: Ensure user has bash as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /bin/bash

- name: Ensure timezone is correct
  become: true
  community.general.timezone:
    name: "{{ bootstrap_ubuntu_timezone }}"

- name: Ensure locale files are available
  become: true
  community.general.locale_gen:
    name: "{{ config_system_locale }}"
    state: present

- name: Ensure language files are available
  become: true
  community.general.locale_gen:
    name: "{{ config_system_language }}"
    state: present

- name: Get current locale and language configuration
  become: true
  ansible.builtin.command: localectl status
  register: locale_status
  changed_when: false

- name: Parse 'LANG' from current locale and language configuration
  become: true
  ansible.builtin.set_fact:
    locale_lang: "{{ locale_status.stdout | regex_search('LANG=([^\n]+)', '\\1') | first }}"

- name: Parse 'LANGUAGE' from current locale and language configuration
  become: true
  ansible.builtin.set_fact:
    locale_language: "{{ locale_status.stdout | regex_search('LANGUAGE=([^\n]+)', '\\1') | default([locale_lang], true) | first }}"

- name: Configure locale and language
  become: true
  ansible.builtin.command: localectl set-locale LANG={{ config_system_locale }} LANGUAGE={{ config_system_language }}
  changed_when: locale_lang != config_system_locale or locale_language != config_system_language

- name: Ensure hostname is correct
  become: true
  ansible.builtin.hostname:
    name: "{{ host_name }}"

- name: Ensure 127.0.1.1 is correct
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ host_name }}"

- name: Ensure PPAs are present
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ ppa_item }}"
    codename: "{{ ansible_facts['distribution_release'] }}"
    update_cache: true
  loop_control:
    loop_var: ppa_item
  loop:
    - ppa:m-grant-prg/utils
    - ppa:tomtomtom/yt-dlp

- name: Ensure direnv hook is enabled
  become: true
  ansible.builtin.lineinfile:
    dest: "/home/{{ item }}/.bashrc"
    line: 'eval "$(direnv hook bash)"'
    state: present
    insertafter: EOF
    create: true
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0644"
  loop:
    - root
    - "{{ ansible_user }}"

