- name: Ensure smartmontools is installed
  become: true
  ansible.builtin.apt:
    name: smartmontools
    state: present

- name: Ensure /etc/smartd.conf exists
  become: true
  ansible.builtin.template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    owner: "root"
    group: "root"
    mode: "0644"
  when: smartmontools_drives is defined
  notify: Restart smartd

- name: Log smartmontools_drives
  ansible.builtin.debug:
    var: smartmontools_drives

- name: Ensure smartd service is enabled and started
  become: true
  ansible.builtin.service:
    name: smartd
    enabled: true
    state: started
  when: smartmontools_drives is defined

- name: Ensure drive database is updated daily
  become: true
  ansible.builtin.cron:
    name: "update-smart-drivedb"
    minute: "0"
    hour: "5"
    job: "/usr/sbin/update-smart-drivedb > /dev/null 2>&1"
    state: present
