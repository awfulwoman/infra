composition_name: uptime-kuma

# Tag applied to all Ansible-managed monitors. Only monitors with this tag
# will be deleted during sync — monitors created via the UI are never touched.
composition_uptime_kuma_monitor_tag: ansible-managed

# Category tags applied for visual grouping in the Uptime Kuma UI.
composition_uptime_kuma_host_tag: hosts
composition_uptime_kuma_composition_tag: compositions

# Subdomain Traefik exposes the REST sidecar on.
composition_uptime_kuma_api_subdomain: uptime-kuma-api

composition_uptime_kuma_subdomains:
  - uptime-kuma
  - "{{ composition_uptime_kuma_api_subdomain }}"
