---
- name: Install nvm (macOS)
  ansible.builtin.include_tasks: install-macos.yaml
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install nvm (Ubuntu/Debian)
  ansible.builtin.include_tasks: install-ubuntu.yaml
  when: ansible_facts['os_family'] != 'Darwin'

- name: Check if Node.js is already installed
  ansible.builtin.shell: |
    [ -s "{{ nvm_sh_path }}" ] && . "{{ nvm_sh_path }}"
    nvm list {{ system_nvm_node_version }}
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts.user_dir }}"
    NVM_DIR: "{{ ansible_facts.user_dir }}/.nvm"
  register: node_installed
  changed_when: false
  failed_when: false

- name: Install Node.js via nvm
  ansible.builtin.shell: |
    [ -s "{{ nvm_sh_path }}" ] && . "{{ nvm_sh_path }}"
    nvm install {{ system_nvm_node_version }}
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts.user_dir }}"
    NVM_DIR: "{{ ansible_facts.user_dir }}/.nvm"
  when: node_installed.rc != 0

- name: Set default Node.js version
  ansible.builtin.shell: |
    [ -s "{{ nvm_sh_path }}" ] && . "{{ nvm_sh_path }}"
    nvm alias default {{ system_nvm_node_version }}
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts.user_dir }}"
    NVM_DIR: "{{ ansible_facts.user_dir }}/.nvm"
  when: system_nvm_set_default
  changed_when: false
