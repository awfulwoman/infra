- name: Assert WAN and LAN interfaces are set
  ansible.builtin.assert:
    that:
      - wan_iface | length > 0
      - lan_iface | length > 0
      - wan_iface != lan_iface
    fail_msg: >-
      wan_iface and lan_iface must both be set (and differ) for this host.
      Set them in host_vars to match the netplan layout.

- name: Enable IP forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Install iptables-persistent
  become: true
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: true

- name: Masquerade outbound traffic on WAN interface
  become: true
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ wan_iface }}"
    jump: MASQUERADE

- name: Allow forwarding from LAN to WAN
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ lan_iface }}"
    out_interface: "{{ wan_iface }}"
    jump: ACCEPT

- name: Allow established/related return traffic WAN to LAN
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_iface }}"
    out_interface: "{{ lan_iface }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT

- name: Allow HTTP/HTTPS forwarding explicitly (optional, if FORWARD default policy is DROP)
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ lan_iface }}"
    out_interface: "{{ wan_iface }}"
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
  loop:
    - "80"
    - "443"

- name: Save iptables rules persistently
  become: true
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
  args:
    creates: /etc/iptables/rules.v4
