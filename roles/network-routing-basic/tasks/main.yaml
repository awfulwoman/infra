- name: Assert WAN and LAN interfaces are set
  ansible.builtin.assert:
    that:
      - wan_iface | length > 0
      - lan_iface | length > 0
      - wan_iface != lan_iface
    fail_msg: >-
      wan_iface and lan_iface must both be set (and differ) for this host.
      Set them in host_vars to match the netplan layout.

- name: Enable IP forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Install iptables-persistent
  become: true
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: true

- name: Masquerade outbound traffic on WAN interface
  become: true
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ wan_iface }}"
    jump: MASQUERADE
  notify: Save iptables rules

- name: Allow forwarding from LAN to WAN
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ lan_iface }}"
    out_interface: "{{ wan_iface }}"
    jump: ACCEPT
  notify: Save iptables rules

- name: Allow established/related return traffic WAN to LAN
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_iface }}"
    out_interface: "{{ lan_iface }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
  notify: Save iptables rules

# --- Firewall hardening (optional, per-host) --------------------------------
# All ACCEPT rules are added BEFORE the default-DROP policies below, so existing
# (established) sessions and the LAN management path are never cut mid-apply.
# The WAN is deliberately NOT allowed to reach the router or initiate forwards.
- name: Allow INPUT on loopback
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
  notify: Save iptables rules
  when: network_routing_firewall

- name: Allow INPUT established/related
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
  notify: Save iptables rules
  when: network_routing_firewall

- name: Allow INPUT from Tailscale (out-of-band management backstop)
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: tailscale0
    jump: ACCEPT
  notify: Save iptables rules
  when: network_routing_firewall

- name: Allow INPUT TCP services from LAN
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ lan_iface }}"
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
  loop: "{{ network_routing_input_tcp_ports }}"
  notify: Save iptables rules
  when: network_routing_firewall

- name: Allow INPUT UDP services from LAN
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ lan_iface }}"
    protocol: udp
    destination_port: "{{ item }}"
    jump: ACCEPT
  loop: "{{ network_routing_input_udp_ports }}"
  notify: Save iptables rules
  when: network_routing_firewall

- name: Allow INPUT ICMP from LAN
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ lan_iface }}"
    protocol: icmp
    jump: ACCEPT
  notify: Save iptables rules
  when: network_routing_firewall

# Policies LAST: by now every needed ACCEPT is in place.
- name: Set FORWARD policy to DROP
  become: true
  ansible.builtin.iptables:
    chain: FORWARD
    policy: DROP
  notify: Save iptables rules
  when: network_routing_firewall

- name: Set INPUT policy to DROP
  become: true
  ansible.builtin.iptables:
    chain: INPUT
    policy: DROP
  notify: Save iptables rules
  when: network_routing_firewall
