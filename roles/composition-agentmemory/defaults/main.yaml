composition_name: agentmemory
composition_agentmemory_subdomains:
  - agentmemory
  - agentmemory-viewer

# Secret pre-seeds /data/.hmac so the entrypoint uses it instead of generating a random one
composition_agentmemory_secret: "{{ vault_agentmemory_secret }}"

# Optional LLM provider key — leave empty to use noop/synthetic-only compression
composition_agentmemory_anthropic_api_key: ""

# Expose all 53 MCP tools (vs 7 in "core" mode)
composition_agentmemory_tools: all

# Version pins — bump together; iii v0.11.6 introduced a sandboxed worker model agentmemory hasn't migrated to yet
composition_agentmemory_version: "0.9.12"
composition_agentmemory_iii_version: "0.11.2"
