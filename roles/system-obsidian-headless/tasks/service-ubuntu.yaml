---
- name: Deploy systemd service unit
  become: true
  ansible.builtin.template:
    src: obsidian-headless.service.j2
    dest: /etc/systemd/system/obsidian-headless.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart obsidian-headless

- name: Ensure obsidian-headless service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: obsidian-headless
    enabled: true
    state: started
    daemon_reload: true
