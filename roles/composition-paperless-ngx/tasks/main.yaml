# code: language=ansible

# ----------------------------
# Core tasks
# ----------------------------

- name: Create compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ composition_root }}/docker-compose.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0774"

- name: Create .env file
  ansible.builtin.template:
    src: environment_vars.j2
    dest: "{{ composition_root }}/.environment_vars"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0774"

# ----------------------------
# Specific tasks
# ----------------------------

- name: Create directories
  ansible.builtin.file:
    path: "{{ composition_config }}/{{ dir_item }}"
    state: directory
  loop_control:
    loop_var: dir_item
  loop:
    - postgres
    - data
    - media
    - export
    - consume

- name: Create scripts directory
  ansible.builtin.file:
    path: "{{ composition_config }}/scripts"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0774"
  when: paperless_ngx_translate_enabled

- name: Create translator build context directory
  ansible.builtin.file:
    path: "{{ composition_root }}/translator"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0774"
  when: paperless_ngx_translate_enabled

- name: Render translator build context
  ansible.builtin.template:
    src: "translator/{{ tpl_item }}.j2"
    dest: "{{ composition_root }}/translator/{{ tpl_item }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop_control:
    loop_var: tpl_item
  loop:
    - Dockerfile
    - requirements.txt
    - app.py
    - ocr_cleanup.py
    - test_translator.py
  when: paperless_ngx_translate_enabled
  notify: Rebuild translator

- name: Render post-consume script
  ansible.builtin.template:
    src: scripts/post_consume.sh.j2
    dest: "{{ composition_config }}/scripts/post_consume.sh"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  when: paperless_ngx_translate_enabled

- name: Render translator env file
  ansible.builtin.template:
    src: environment_vars_translator.j2
    dest: "{{ composition_root }}/.environment_vars_translator"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0660"
  when: paperless_ngx_translate_enabled

- name: Run Configure DNS role
  ansible.builtin.include_role:
    name: "network-register-subdomain"
  vars:
    configure_dns_subdomains: "{{ composition_paperless_ngx_subdomains }}"

# ----------------------------
# Start composition
# ----------------------------

- name: Start Docker Compose project
  community.docker.docker_compose_v2:
    project_src: "{{ composition_root }}"
    state: present
    build: always
    remove_orphans: true
  notify: Restart Traefik
