# Installs Homebrew on MacOS and Linux

- name: Ensure Homebrew prerequisites are installed (Linux)
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
    state: present
  become: true
  when: ansible_facts['system'] == 'Linux'

- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: "{{ system_homebrew_bin }}"
  register: homebrew_check

- name: Install Homebrew
  when: not homebrew_check.stat.exists
  block:
    - name: Add temporary passwordless sudo for Homebrew installation
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible-homebrew
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        mode: "0440"
        validate: visudo -cf %s
      become: true

    - name: Run Homebrew install script
      ansible.builtin.shell:
        cmd: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      environment:
        NONINTERACTIVE: "1"
  always:
    - name: Remove temporary passwordless sudo
      ansible.builtin.file:
        path: /etc/sudoers.d/ansible-homebrew
        state: absent
      become: true
      when: not homebrew_check.stat.exists

- name: Ensure Homebrew shellenv is configured in shell profile (Linux)
  ansible.builtin.lineinfile:
    path: "~/.bashrc"
    line: 'eval "$({{ system_homebrew_bin }} shellenv)"'
    state: present
  when: ansible_facts['system'] == 'Linux'

- name: Ensure Homebrew formulae are installed
  community.general.homebrew:
    name: "{{ system_homebrew_formulae }}"
    path: "{{ system_homebrew_bin | dirname }}"
    state: present
