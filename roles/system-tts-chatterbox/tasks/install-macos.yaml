---
- name: Ensure uv is installed via Homebrew
  community.general.homebrew:
    name: uv
    state: present

- name: Ensure chatterbox base directory exists
  become: true
  ansible.builtin.file:
    path: "{{ system_chatterbox_base_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: staff

- name: Ensure logs directory exists
  ansible.builtin.file:
    path: "{{ system_chatterbox_base_dir }}/logs"
    state: directory
    mode: "0755"

- name: Deploy Wyoming server script
  ansible.builtin.copy:
    src: server.py
    dest: "{{ system_chatterbox_base_dir }}/server.py"
    mode: "0755"
  register: chatterbox_server

- name: Sync voice reference files
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/voices/"
    dest: "{{ system_chatterbox_base_dir }}/voices/"
    delete: true
    checksum: true
  register: chatterbox_voices

- name: Ensure Python venv exists
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/uv venv "{{ system_chatterbox_base_dir }}/venv" --python 3.11
    creates: "{{ system_chatterbox_base_dir }}/venv/bin/python"

- name: Install Python dependencies
  ansible.builtin.command:
    cmd: >
      /opt/homebrew/bin/uv pip install
      --python "{{ system_chatterbox_base_dir }}/venv/bin/python"
      chatterbox-tts
      wyoming
      numpy
  changed_when: false

- name: Ensure LaunchAgents directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/Library/LaunchAgents"
    state: directory
    mode: "0755"

- name: Deploy launchd plist
  ansible.builtin.template:
    src: launchd.plist.j2
    dest: "{{ ansible_facts.user_dir }}/Library/LaunchAgents/com.awfulwoman.chatterbox.plist"
    mode: "0644"
  register: chatterbox_plist

- name: Unload service before reload on change # noqa: no-handler
  ansible.builtin.command: "launchctl unload {{ ansible_facts.user_dir }}/Library/LaunchAgents/com.awfulwoman.chatterbox.plist"
  when: chatterbox_plist.changed or chatterbox_server.changed or chatterbox_voices.changed
  changed_when: false
  failed_when: false

- name: Load service # noqa: no-handler
  ansible.builtin.command: "launchctl load {{ ansible_facts.user_dir }}/Library/LaunchAgents/com.awfulwoman.chatterbox.plist"
  when: chatterbox_plist.changed or chatterbox_server.changed or chatterbox_voices.changed
  register: chatterbox_load
  changed_when: chatterbox_load.rc == 0
  failed_when: false

- name: Ensure service is running
  ansible.builtin.command: launchctl list com.awfulwoman.chatterbox
  register: chatterbox_status
  changed_when: false
  failed_when: chatterbox_status.rc != 0
