# code: language=ansible

# ----------------------------
# Migration: remove old composition-kagimcp
# ----------------------------

- name: "Remove old kagimcp container (renamed to mcp-kagisearch)"
  community.docker.docker_container:
    name: kagimcp
    state: absent

- name: "Remove old kagimcp ZFS dataset (renamed to mcp-kagisearch)"
  become: true
  community.general.zfs:
    name: "{{ compositions_dataset }}/kagimcp"
    state: absent
  failed_when: false

# ----------------------------
# Core tasks
# ----------------------------

- name: "Create Dockerfile"
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ composition_root }}/Dockerfile"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: "Create compose file"
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ composition_root }}/docker-compose.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Register DNS subdomain
  ansible.builtin.include_role:
    name: "network-register-subdomain"
  vars:
    configure_dns_subdomains: "{{ composition_mcp_kagisearch_subdomains }}"

- name: Start Docker Compose project
  community.docker.docker_compose_v2:
    project_src: "{{ composition_root }}"
    state: present
    build: always
    remove_orphans: true
  notify: Restart Traefik
