- name: Configure environment variables (Debian)
  become: true
  when:
    - environment_config | length > 0
    - ansible_facts['os_family'] == 'Debian'
  ansible.builtin.lineinfile:
    path: "{{ environment_file if environment_file else '/etc/environment' }}"
    regexp: "^{{ item.key }}\\s*="
    line: "{{ item.key }}='{{ item.value }}'"
    create: true
    owner: root
    group: root
    mode: "0644"
  loop: "{{ environment_config | dict2items }}"

- name: Configure environment variables (macOS)
  when:
    - environment_config | length > 0
    - ansible_facts['os_family'] == 'Darwin'
  ansible.builtin.lineinfile:
    path: "{{ environment_file if environment_file else ansible_facts.user_dir + '/.zshenv' }}"
    regexp: "^export {{ item.key }}\\s*="
    line: "export {{ item.key }}='{{ item.value }}'"
    create: true
    mode: "0644"
  loop: "{{ environment_config | dict2items }}"
