---
system_mcp_gateway_base_dir: "{{ awfulwoman_opt_dir }}"
system_mcp_gateway_repo_dir: "{{ system_mcp_gateway_base_dir }}/gateway"
system_mcp_gateway_repo_url: "git@github.com:awfulwoman/gateway.git"
system_mcp_gateway_repo_version: main

system_mcp_gateway_imap_host: "imap.mailbox.org"
system_mcp_gateway_imap_port: 993
system_mcp_gateway_imap_username: "{{ vault_mailprovider_user }}"
system_mcp_gateway_imap_password: "{{ vault_mailprovider_password }}"

system_mcp_gateway_obsidian_vault_path: "{{ ansible_facts.user_dir }}/Obsidian"

system_mcp_gateway_karakeep_base_url: "https://karakeep.{{ domainname_infra }}"
system_mcp_gateway_karakeep_api_key: "{{ vault_karakeep_api }}"

system_mcp_gateway_reminders_base_url: "https://radicale.{{ domainname_infra }}"
system_mcp_gateway_reminders_username: charlie
system_mcp_gateway_reminders_password: "{{ vault_radicale_password }}"

system_mcp_gateway_reminders_db_path: "{{ system_mcp_gateway_repo_dir }}/data/reminders.db"
system_mcp_gateway_reminders_api_tokens: "{{ vault_gateway_reminders_api_token_iphone }}"
system_mcp_gateway_reminders_nominatim_url: "https://nominatim.{{ domainname_infra }}"

system_mcp_gateway_server_host: "127.0.0.1"
system_mcp_gateway_server_port: 4000

# Not yet enforced server-side (GATEWAY_SERVER__AUTH_TOKENS in env.j2 is still
# empty) — this just makes gw, run locally on this host, ready with a token for
# when it is.
system_mcp_gateway_cli_token: "{{ vault_gateway_mcp_token }}"
