# code: language=ansible

- name: "Create compose file"
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ composition_root }}/docker-compose.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0774"

- name: "Create .env file"
  ansible.builtin.template:
    src: environment_vars.j2
    dest: "{{ composition_root }}/.environment_vars"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: "Create mcps.yaml"
  ansible.builtin.template:
    src: mcps.yaml.j2
    dest: "{{ composition_config }}/mcps.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: "Create state directory"
  ansible.builtin.file:
    path: "{{ composition_config }}/state"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: "Create profile directory"
  ansible.builtin.file:
    path: "{{ composition_config }}/profile"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: "Start Docker Compose project"
  community.docker.docker_compose_v2:
    project_src: "{{ composition_root }}"
    state: present
    pull: always
    remove_orphans: true
  notify: Restart Traefik
