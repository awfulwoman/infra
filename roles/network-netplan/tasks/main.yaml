---
- name: Build netplan configuration
  ansible.builtin.set_fact:
    network_netplan: >-
      {{
        (
          {
            'renderer': network_netplan_renderer,
            'ethernets': {
              network_netplan_interface: (
                (
                  {'dhcp4': true, 'nameservers': {'addresses': network_netplan_nameservers}}
                  | combine({'addresses': host_ipv4_extra} if host_ipv4_extra else {})
                )
                if network_netplan_mode == 'dhcp'
                else {
                  'addresses': [host_ipv4 ~ '/' ~ network_netplan_subnet] + host_ipv4_extra,
                  'routes': [{'to': 'default', 'via': network_netplan_gateway}],
                  'nameservers': {'addresses': network_netplan_nameservers}
                }
              )
            }
          }
          if host_ipv4 | default(false)
          else {'renderer': network_netplan_renderer}
        ) | combine(network_netplan_config, recursive=true)
      }}
  tags:
    - network-netplan
    - netplan

- name: Fail if no network configuration is provided
  ansible.builtin.fail:
    msg: "network-netplan: neither host_ipv4 nor network_netplan_config is set"
  when:
    - not (host_ipv4 | default(false))
    - not network_netplan_config
  tags:
    - network-netplan
    - netplan

- name: Ensure netplan is installed
  become: true
  ansible.builtin.apt:
    name:
      - netplan.io
      - bridge-utils
    state: present
  tags:
    - network-netplan
    - netplan

- name: Disable cloud-init network configuration
  become: true
  ansible.builtin.copy:
    content: "network: {config: disabled}\n"
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: "0644"
  tags:
    - network-netplan
    - netplan

- name: Remove cloud-init netplan configuration if present
  become: true
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent
  notify: Apply netplan
  tags:
    - network-netplan
    - netplan

- name: Deploy primary interface netplan configuration
  become: true
  ansible.builtin.template:
    src: 50-primary-interface.yaml.j2
    dest: /etc/netplan/50-primary-interface.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan
  tags:
    - network-netplan
    - netplan

- name: Ensure NetworkManager is not managing primary interface
  become: true
  ansible.builtin.systemd:
    name: NetworkManager
    state: stopped
    enabled: false
  when: ansible_facts.services['NetworkManager.service'] is defined
  failed_when: false
  tags:
    - network-netplan
    - netplan
