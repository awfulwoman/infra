# -------------------------------------------------------------------
# ANSIBLE
# -------------------------------------------------------------------
ansible_host: 192.168.1.2
ansible_user: "{{ vault_server_username }}"

# -------------------------------------------------------------------
# IDENTITY
# -------------------------------------------------------------------
host_type: baremetal
host_name: deedee
host_city: ber
host_location: xberg
host_ipv4: 192.168.1.2
host_pfqdn: "{{ host_name }}.{{ host_location }}.{{ host_city }}"
host_fqdn: "{{ host_pfqdn }}.{{ domain_name }}"
host_description: "Runs infrastructure tasks"

# -------------------------------------------------------------------
# UBUNTUPRO
# -------------------------------------------------------------------
ubuntupro_attach: true

# -------------------------------------------------------------------
# HARDWARE
# -------------------------------------------------------------------
raspberry_pi_wifi: false
raspberry_pi_bluetooth: false
raspberry_pi_boot_config_location: /boot/firmware/config.txt

# -------------------------------------------------------------------
# NETWORK
# -------------------------------------------------------------------
host_primary_interface: "eth0"

# -------------------------------------------------------------------
# ZFS
# -------------------------------------------------------------------

zfs:
  fastpool:
    vdevs:
      - type: stripe
        disks: "/dev/disk/by-id/usb-USB_SanDisk_3.2Gen1_0101085aa99be2f8a662a41def4f69ad14c549ec7c1478b16ee8f5755444f2bb6e040000000000000000000042340285ff0c2b009155810791aaab60-0:0"
    datasets:
      compositions:
        policy: critical
        children_inherit_policy: true
        datasets:
          awfulwoman:
            policy: none
          container-management:
            policy: none
          reverseproxy:
            policy: none
      acme:
        policy: critical
      terraform:
        policy: critical
      claude:
        policy: critical
      repos:
        policy: critical

# -------------------------------------------------------------------
# MISC
# -------------------------------------------------------------------

acme_path: "/fastpool/acme"
terraform_working_dir: "/fastpool/terraform"

# -------------------------------------------------------------------
# COMPOSITIONS
# -------------------------------------------------------------------
reverseproxy_use_letsencrypt: false

# -------------------------------------------------------------------
# AUTOMATION INFRA
# -------------------------------------------------------------------
automation_infra_ansible_playbook_bin: /fastpool/repos/infra/.venv/bin/ansible-playbook

# -------------------------------------------------------------------
# REPOS
# -------------------------------------------------------------------

# The following repos will be pulled and made available at /fastpool/repos
repos:
  - repo: awfulwoman/infra
    name: infra
  - repo: qwibitai/NanoClaw
    name: nanoclaw
