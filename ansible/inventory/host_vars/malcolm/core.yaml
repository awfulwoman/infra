# -------------------------------------------------------------------
# ANSIBLE
# -------------------------------------------------------------------
ansible_host: 100.125.31.111
ansible_user: "{{ vault_server_username }}"
ansible_become_password: "{{ vault_password }}"

# -------------------------------------------------------------------
# IDENTITY
# -------------------------------------------------------------------
host_type: baremetal
host_name: malcolm
host_city: ber
host_location: xberg
host_ipv4: 192.168.1.150
host_pfqdn: "{{ host_name }}.{{ host_location }}.{{ host_city }}"
host_fqdn: "{{ host_pfqdn }}.{{ domain_name }}"
host_description: "Mac Mini macOS server"

# -------------------------------------------------------------------
# OLLAMA
# -------------------------------------------------------------------
system_ollama_env:
  OLLAMA_HOST: "0.0.0.0:11434"

system_ollama_models:
  - gemma3:4b

# -------------------------------------------------------------------
# CLAUDE
# -------------------------------------------------------------------
system_claude_settings_path: "/opt/claude"
system_claude_settings_group: "staff"
system_claude_profile_file: ".zshrc"
