---
# Sparse override dict — hosts set only what differs, in netplan-native format.
# The primary interface config is auto-generated from host_ipv4/host_primary_interface
# /host_ipv4_subnet in tasks/main.yaml, then deep-merged with this.
#
# Example multi-NIC override (e.g. a router):
#
#   network_netplan_config:
#     ethernets:
#       eth0:          # WAN
#         dhcp4: true
#       eth1:          # LAN
#         addresses: [192.168.1.1/24]
#
network_netplan_config: {}

# Renderer
network_netplan_renderer: networkd

# Gateway for static configuration
network_netplan_gateway: "192.168.1.1"

# DNS nameservers for static and DHCP configurations
network_netplan_nameservers: [192.168.1.1]

# --- Derived vars used in set_fact (do not override directly) ---

# Primary interface name
network_netplan_interface: "{{ host_primary_interface | default('eth0') }}"

# Netmask/CIDR
network_netplan_subnet: "{{ host_ipv4_subnet | default(24) }}"

# Configuration mode: auto-detect based on host_ipv4
network_netplan_mode: "{{ 'static' if (host_ipv4 | default('', true)) else 'dhcp' }}"

# Auto-apply via handler
network_netplan_auto_apply: true
