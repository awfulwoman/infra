# -------------------------------------------------------
# RATE LIMITS APPLY FROM HERE ON
# PLEASE TALK TO A RESPONSIBLE ADULT BEFORE RUNNING THIS
# -------------------------------------------------------

- name: Request a DNS-01 challenge
  community.crypto.acme_certificate:
    validate_certs: true
    account_key_src: "{{ infra_certbot_le_private_key_dir }}/{{ infra_certbot_le_private_key_filename }}"
    account_email: "{{ infra_certbot_email }}"
    src: "{{ infra_certbot_csr_dir }}/{{ dns01_domain_full }}.csr"
    cert: "{{ infra_certbot_cert_dir }}/{{ dns01_domain_full }}.crt"
    challenge: dns-01
    acme_directory: "{{ infra_certbot_dir }}"
    acme_version: "{{ infra_certbot_version }}"
    remaining_days: 60
  register: domain_challenge

- name: Debug DNS-01 challenge
  ansible.builtin.debug:
    var: domain_challenge
  when: infra_certbot_debug

- name: Respond to DNS-01 challenge
  when: domain_challenge.authorizations[dns01_domain_full].challenges[0].status == "pending"
  community.dns.hetzner_dns_record:
    state: present
    hetzner_api_token: "{{ vault_hetzner_api_key_rw }}"
    zone_name: "{{ dns01_domain_base }}"
    type: TXT
    ttl: 60
    prefix: "{{ domain_challenge.challenge_data[dns01_domain_full]['dns-01'].resource }}{{ '.' + dns01_domain_sub_no_wildcard if dns01_domain_sub_no_wildcard }}"
    value: "{{ domain_challenge.challenge_data[dns01_domain_full]['dns-01'].resource_value }}"
  register: txt_response

- name: Debug txt verification
  ansible.builtin.debug:
    var: txt_response
  when: (infra_certbot_debug) and (txt_response is defined)

- name: Wait for TXT record to propagate
  ansible.builtin.pause:
    seconds: 30
  when: txt_response is defined and txt_response.changed

- name: Collect certificate order
  when: domain_challenge.authorizations[dns01_domain_full].challenges[0].status == "pending"
  community.crypto.acme_certificate:
    validate_certs: true
    account_email: "{{ infra_certbot_email }}"
    src: "{{ infra_certbot_csr_dir }}/{{ dns01_domain_full }}.csr"
    cert: "{{ infra_certbot_cert_dir }}/{{ dns01_domain_full }}.crt"
    fullchain: "{{ infra_certbot_cert_dir }}/{{ dns01_domain_full }}.fullchain.crt"
    chain: "{{ infra_certbot_cert_dir }}/{{ dns01_domain_full }}.intermediate.crt"
    challenge: dns-01
    remaining_days: 60
    data: "{{ domain_challenge }}"
    acme_directory: "{{ infra_certbot_dir }}"
    acme_version: "{{ infra_certbot_version }}"
    account_key_src: "{{ infra_certbot_le_private_key_dir }}/{{ infra_certbot_le_private_key_filename }}"
  register: lsresult
  until: "lsresult is not failed"
  retries: 12
  delay: 10

- name: Debug collected order
  ansible.builtin.debug:
    var: lsresult
  when: infra_certbot_debug

- name: Remove TXT record
  community.dns.hetzner_dns_record:
    state: absent
    hetzner_api_token: "{{ vault_hetzner_api_key_rw }}"
    zone_name: "{{ dns01_domain_base }}"
    type: TXT
    prefix: "{{ domain_challenge.challenge_data[dns01_domain_full]['dns-01'].resource }}{{ '.' + dns01_domain_sub_no_wildcard if dns01_domain_sub_no_wildcard }}"
    value: "{{ domain_challenge.challenge_data[dns01_domain_full]['dns-01'].resource_value }}"
  register: txt_remove_response
  when: txt_response is defined

- name: Debug txt_remove_response
  ansible.builtin.debug:
    var: txt_remove_response
  when: infra_certbot_debug and (txt_remove_response is defined)

- name: DNS01 Finished
  ansible.builtin.debug:
    msg: "Enjoy {{ dns01_domain_full }}"
